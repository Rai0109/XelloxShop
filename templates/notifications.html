<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thông báo - Xelloxx Shop</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0a0f;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .navbar {
        background: #13131a;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e1e2e;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .navbar a {
        color: #e0e0e0;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.2rem;
      }
      .navbar a span {
        color: #7c3aed;
      }
      .nav-links {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .nav-links a {
        color: #a0a0b0;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 8px;
        transition: 0.2s;
      }
      .nav-links a:hover {
        background: #1e1e2e;
        color: #e0e0e0;
      }
      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff !important;
        padding: 8px 18px;
        border-radius: 8px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 32px 16px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 1.8rem;
      }
      h1 span {
        color: #7c3aed;
      }
      .btn-mark-all {
        background: #1e1e2e;
        border: none;
        color: #a78bfa;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.9rem;
      }
      .btn-mark-all:hover {
        background: #7c3aed;
        color: #fff;
      }
      .notif-item {
        background: #13131a;
        border: 1px solid #1e1e2e;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 12px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        cursor: pointer;
        transition: 0.2s;
        position: relative;
      }
      .notif-item.unread {
        border-color: #7c3aed40;
        background: #13131a;
      }
      .notif-item.unread::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 60%;
        background: #7c3aed;
        border-radius: 0 4px 4px 0;
      }
      .notif-item:hover {
        border-color: #7c3aed50;
      }
      .notif-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
      }
      .notif-icon.success {
        background: #10b98120;
      }
      .notif-icon.error {
        background: #ef444420;
      }
      .notif-icon.warning {
        background: #f5970020;
      }
      .notif-icon.info {
        background: #7c3aed20;
      }
      .notif-body {
        flex: 1;
      }
      .notif-title {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .notif-text {
        color: #a0a0b0;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .notif-time {
        font-size: 0.8rem;
        color: #555;
        margin-top: 6px;
      }
      .unread-dot {
        width: 8px;
        height: 8px;
        background: #7c3aed;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 6px;
      }
      .empty {
        text-align: center;
        padding: 80px 20px;
      }
      .empty i {
        font-size: 3rem;
        color: #333;
        margin-bottom: 16px;
        display: block;
      }
      .empty p {
        color: #555;
      }
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .tab {
        background: #1e1e2e;
        border: none;
        color: #a0a0b0;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.2s;
      }
      .tab.active,
      .tab:hover {
        background: #7c3aed;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/"><span>X</span>elloxx Shop</a>
      <div class="nav-links">
        <a href="/">Trang chủ</a>
        <a href="/orders">Đơn hàng</a>
        <a href="/topup" class="btn-primary"
          ><i class="fas fa-wallet"></i> Nạp xu</a
        >
      </div>
    </nav>
    <div class="container">
      <div class="page-header">
        <h1>🔔 <span>Thông báo</span></h1>
        <button class="btn-mark-all" onclick="markAllRead()">
          <i class="fas fa-check-double"></i> Đánh dấu đã đọc (cá nhân)
        </button>
      </div>

      <!-- Personal Notifications -->
      <div style="margin-bottom: 2rem">
        <h3 style="color: #7c3aed; margin-bottom: 1rem">
          📱 Thông báo cá nhân
        </h3>
        <div class="filter-tabs">
          <button class="tab active" onclick="setPersonalFilter('all', this)">
            Tất cả
          </button>
          <button class="tab" onclick="setPersonalFilter('unread', this)">
            Chưa đọc
          </button>
          <button class="tab" onclick="setPersonalFilter('success', this)">
            Thành công
          </button>
          <button class="tab" onclick="setPersonalFilter('info', this)">
            Thông tin
          </button>
        </div>
        <div id="personal-notifs-list"></div>
      </div>

      <!-- Public Notifications -->
      <div>
        <h3 style="color: #10b981; margin-bottom: 1rem">
          📢 Thông báo công khai
        </h3>
        <div id="public-notifs-list" style="min-height: 100px"></div>
      </div>
    </div>
    <script>
      let allPersonalNotifs = [],
        allPublicNotifs = [],
        currentPersonalFilter = "all";
      const icons = { success: "✅", error: "❌", warning: "⚠️", info: "📢" };

      async function loadPersonalNotifs() {
        const r = await fetch("/api/notifications");
        const d = await r.json();
        if (!d.ok) {
          location.href = "/login";
          return;
        }
        allPersonalNotifs = d.notifications;
        renderPersonalNotifs();
      }

      async function loadPublicNotifs() {
        try {
          const r = await fetch("/api/public-notifications");
          const d = await r.json();
          allPublicNotifs = d.notifications || [];
        } catch (e) {
          allPublicNotifs = [];
        }
        renderPublicNotifs();
      }

      function setPersonalFilter(f, btn) {
        currentPersonalFilter = f;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");
        renderPersonalNotifs();
      }

      function renderPersonalNotifs() {
        let notifs = allPersonalNotifs;
        if (currentPersonalFilter === "unread")
          notifs = allPersonalNotifs.filter((n) => !n.read);
        else if (currentPersonalFilter !== "all")
          notifs = allPersonalNotifs.filter(
            (n) => n.type === currentPersonalFilter,
          );
        const el = document.getElementById("personal-notifs-list");
        if (!notifs.length) {
          el.innerHTML = `<div class="empty"><i class="fas fa-bell-slash"></i><p>Không có thông báo cá nhân</p></div>`;
          return;
        }
        el.innerHTML = notifs
          .map(
            (n) => `
          <div class="notif-item ${n.read ? "" : "unread"}" onclick="markPersonalRead('${n.id}',this)">
            <div class="notif-icon ${n.type}">${icons[n.type] || "📢"}</div>
            <div class="notif-body">
              <div class="notif-title">${n.title}</div>
              <div class="notif-text">${n.body}</div>
              <div class="notif-time"><i class="fas fa-clock"></i> ${n.created_at}</div>
            </div>
            ${!n.read ? '<div class="unread-dot"></div>' : ""}
          </div>`,
          )
          .join("");
      }

      function renderPublicNotifs() {
        const el = document.getElementById("public-notifs-list");
        if (!allPublicNotifs.length) {
          el.innerHTML = `<div class="empty"><i class="fas fa-bullhorn"></i><p>Chưa có thông báo công khai</p></div>`;
          return;
        }
        el.innerHTML = allPublicNotifs
          .map(
            (n) => `
          <div class="notif-item unread" style="cursor: default;">
            <div class="notif-icon ${n.type}">${icons[n.type] || "📢"}</div>
            <div class="notif-body">
              <div class="notif-title" style="font-size: 1.1rem;">${n.username === "public" ? "[Khách hàng]" : n.title}</div>
              <div class="notif-text">${n.body}</div>
              <div class="notif-time"><i class="fas fa-clock"></i> ${n.created_at} <span style="color: #10b981;">📢 Công khai</span></div>
            </div>
          </div>`,
          )
          .join("");
      }

      async function markPersonalRead(id, el) {
        if (el.classList.contains("unread")) {
          el.classList.remove("unread");
          el.querySelector(".unread-dot")?.remove();
          await fetch("/api/notifications/read", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id }),
          });
          const n = allPersonalNotifs.find((x) => x.id === id);
          if (n) n.read = true;
          renderPersonalNotifs();
        }
      }

      async function markAllRead() {
        await fetch("/api/notifications/read", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: null }),
        });
        allPersonalNotifs.forEach((n) => (n.read = true));
        renderPersonalNotifs();
      }

      loadPersonalNotifs();
      loadPublicNotifs();
    </script>
  </body>
</html>
