<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - BONZ STORE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080c14;
        --card: #111827;
        --border: rgba(255, 150, 0, 0.15);
        --accent: #ff6a00;
        --accent2: #ff9500;
        --text: #e8eaf0;
        --muted: #8892a4;
        --green: #10b981;
        --red: #ef4444;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          rgba(255, 106, 0, 0.1),
          transparent 70%
        );
        pointer-events: none;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        position: relative;
        z-index: 1;
      }
      .logo {
        font-size: 1.8rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 0.3rem;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub {
        text-align: center;
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 1.8rem;
      }
      .steps {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.8rem;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.75rem;
        color: var(--muted);
        font-family: "Space Mono", monospace;
      }
      .step-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255, 150, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        transition: 0.3s;
      }
      .step.active .step-dot {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .step.done .step-dot {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .step-line {
        width: 32px;
        height: 2px;
        background: rgba(255, 150, 0, 0.2);
        border-radius: 2px;
      }
      .form-row {
        margin-bottom: 1rem;
      }
      .form-row label {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
        font-family: "Space Mono", monospace;
        letter-spacing: 0.5px;
      }
      .form-row input {
        width: 100%;
        padding: 0.8rem 1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: 0.2s;
      }
      .form-row input:focus {
        border-color: var(--accent);
        background: rgba(255, 106, 0, 0.04);
      }
      .input-group {
        display: flex;
        gap: 0.5rem;
      }
      .input-group input {
        flex: 1;
      }
      .btn {
        width: 100%;
        padding: 0.85rem;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border: none;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-sm {
        padding: 0.5rem 1rem;
        font-size: 0.82rem;
        width: auto;
        white-space: nowrap;
      }
      .msg {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        display: none;
      }
      .msg.err {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .msg.ok {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #34d399;
      }
      .links {
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .links a {
        color: var(--accent);
        text-decoration: none;
      }
      .otp-verified {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--green);
        font-size: 0.82rem;
        font-family: "Space Mono", monospace;
        margin-top: 0.3rem;
      }
      .countdown {
        font-family: "Space Mono", monospace;
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 0.3rem;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="card">
      <div class="logo">🛒 BONZ STORE</div>
      <div class="sub">Tạo tài khoản mới</div>

      <!-- Steps indicator -->
      <div class="steps">
        <div class="step active" id="step1ind">
          <div class="step-dot">1</div>
          <span>Thông tin</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step2ind">
          <div class="step-dot">2</div>
          <span>Xác thực OTP</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step3ind">
          <div class="step-dot">3</div>
          <span>Hoàn tất</span>
        </div>
      </div>

      <div class="msg" id="msg"></div>

      <!-- Step 1: Basic Info -->
      <div class="section active" id="s1">
        <div class="form-row">
          <label>TÊN ĐĂNG NHẬP</label
          ><input
            type="text"
            id="user"
            placeholder="username (tối thiểu 3 ký tự)"
            autocomplete="username"
          />
        </div>
        <div class="form-row">
          <label>EMAIL</label
          ><input
            type="email"
            id="email"
            placeholder="email@gmail.com"
            autocomplete="email"
          />
        </div>
        <div class="form-row">
          <label>MẬT KHẨU</label
          ><input
            type="password"
            id="pass"
            placeholder="•••••••• (tối thiểu 6 ký tự)"
            autocomplete="new-password"
          />
        </div>
        <div class="form-row">
          <label>XÁC NHẬN MẬT KHẨU</label
          ><input
            type="password"
            id="pass2"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="form-row">
          <label>MÃ GIỚI THIỆU (tùy chọn)</label
          ><input type="text" id="ref-code" placeholder="Nhập mã nếu có..." />
        </div>
        <button class="btn" id="btnSendOtp" onclick="sendOtp()">
          Gửi mã OTP →
        </button>
      </div>

      <!-- Step 2: OTP Verification -->
      <div class="section" id="s2">
        <div style="text-align: center; margin-bottom: 1.5rem">
          <div style="font-size: 2.5rem; margin-bottom: 0.5rem">📧</div>
          <p style="color: var(--muted); font-size: 0.88rem">
            Mã OTP đã được gửi đến
          </p>
          <p
            style="color: var(--text); font-weight: 700; font-size: 1rem"
            id="emailDisplay"
          ></p>
        </div>
        <div class="form-row">
          <label>NHẬP MÃ OTP (6 SỐ)</label>
          <div class="input-group">
            <input
              type="text"
              id="otpInput"
              placeholder="000000"
              maxlength="6"
              style="
                font-family: &quot;Space Mono&quot;, monospace;
                font-size: 1.4rem;
                text-align: center;
                letter-spacing: 0.5rem;
              "
            />
          </div>
          <div class="countdown" id="countdown"></div>
        </div>
        <button
          class="btn"
          id="btnVerify"
          onclick="verifyOtp()"
          style="margin-bottom: 0.7rem"
        >
          ✅ Xác thực OTP
        </button>
        <button class="btn btn-outline" onclick="resendOtp()" id="btnResend">
          🔄 Gửi lại mã
        </button>
        <button
          class="btn btn-outline"
          onclick="backToStep1()"
          style="margin-top: 0.5rem"
        >
          ← Quay lại
        </button>
      </div>

      <!-- Step 3: Complete Registration -->
      <div class="section" id="s3">
        <div style="text-align: center; margin-bottom: 1.5rem">
          <div style="font-size: 3rem; margin-bottom: 0.5rem">🎉</div>
          <p style="color: var(--green); font-size: 1rem; font-weight: 700">
            OTP đã xác thực thành công!
          </p>
          <p
            style="color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem"
          >
            Nhấn bên dưới để hoàn tất đăng ký
          </p>
        </div>
        <button class="btn" onclick="completeRegister()">
          🚀 Hoàn tất đăng ký
        </button>
        <button
          class="btn btn-outline"
          onclick="backToStep2()"
          style="margin-top: 0.7rem"
        >
          ← Quay lại
        </button>
      </div>

      <div class="links">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
    </div>

    <script>
      const urlRef = new URLSearchParams(location.search).get("ref");
      if (urlRef) document.getElementById("ref-code").value = urlRef;

      let otpVerified = false;
      let countdownTimer = null;

      function showMsg(text, type = "err") {
        const m = document.getElementById("msg");
        m.textContent = text;
        m.className = "msg " + type;
        m.style.display = "block";
        if (type === "ok") setTimeout(() => (m.style.display = "none"), 4000);
      }
      function setStep(n) {
        document.getElementById("s1").classList.remove("active");
        document.getElementById("s2").classList.remove("active");
        document.getElementById("s3").classList.remove("active");
        document.getElementById("s" + n).classList.add("active");
        document.getElementById("msg").style.display = "none";
        [1, 2, 3].forEach((i) => {
          const el = document.getElementById("step" + i + "ind");
          el.classList.remove("active", "done");
          if (i < n) el.classList.add("done");
          else if (i === n) el.classList.add("active");
        });
      }
      function startCountdown(seconds = 300) {
        clearInterval(countdownTimer);
        const el = document.getElementById("countdown");
        let remaining = seconds;
        function update() {
          const m = Math.floor(remaining / 60),
            s = remaining % 60;
          el.textContent = `⏱ Mã hết hạn sau: ${m}:${s.toString().padStart(2, "0")}`;
          if (remaining <= 0) {
            clearInterval(countdownTimer);
            el.textContent = "⚠️ Mã đã hết hạn. Hãy gửi lại.";
          }
          remaining--;
        }
        update();
        countdownTimer = setInterval(update, 1000);
      }

      async function sendOtp() {
        const u = document.getElementById("user").value.trim();
        const e = document.getElementById("email").value.trim();
        const p = document.getElementById("pass").value;
        const p2 = document.getElementById("pass2").value;
        if (u.length < 3) {
          showMsg("Tên đăng nhập tối thiểu 3 ký tự");
          return;
        }
        if (!e || !e.includes("@")) {
          showMsg("Email không hợp lệ");
          return;
        }
        if (p.length < 6) {
          showMsg("Mật khẩu tối thiểu 6 ký tự");
          return;
        }
        if (p !== p2) {
          showMsg("Mật khẩu không khớp");
          return;
        }
        const btn = document.getElementById("btnSendOtp");
        btn.disabled = true;
        btn.textContent = "Đang gửi...";
        try {
          const r = await fetch("/api/otp/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, email: e }),
          });
          const d = await r.json();
          if (d.ok) {
            document.getElementById("emailDisplay").textContent = e;
            setStep(2);
            startCountdown(300);
          } else {
            let msg = d.msg;
            if (
              msg.includes("Không thể gửi OTP") ||
              msg.includes("Failed to send")
            ) {
              msg +=
                "\\n\\n💡 DEV MODE: Check console logs for OTP code.\\n🔧 Gmail: Enable App Password (.env.example → .env, SMTP_PASS)";
            }
            showMsg(msg);
          }
        } catch (err) {
          showMsg("Lỗi kết nối");
        }
        btn.disabled = false;
        btn.textContent = "Gửi mã OTP →";
      }

      async function verifyOtp() {
        const code = document.getElementById("otpInput").value.trim();
        const email = document.getElementById("email").value.trim();
        if (code.length !== 6) {
          showMsg("Mã OTP gồm 6 chữ số");
          return;
        }
        const btn = document.getElementById("btnVerify");
        btn.disabled = true;
        btn.textContent = "Đang xác thực...";
        try {
          const r = await fetch("/api/otp/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, code }),
          });
          const d = await r.json();
          if (d.ok) {
            otpVerified = true;
            clearInterval(countdownTimer);
            setStep(3);
          } else {
            showMsg(d.msg);
          }
        } catch (err) {
          showMsg("Lỗi kết nối");
        }
        btn.disabled = false;
        btn.textContent = "✅ Xác thực OTP";
      }

      async function resendOtp() {
        const u = document.getElementById("user").value.trim();
        const e = document.getElementById("email").value.trim();
        const btn = document.getElementById("btnResend");
        btn.disabled = true;
        btn.textContent = "Đang gửi lại...";
        try {
          const r = await fetch("/api/otp/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, email: e }),
          });
          const d = await r.json();
          if (d.ok) {
            showMsg("✅ Đã gửi lại mã OTP!", "ok");
            startCountdown(300);
            document.getElementById("otpInput").value = "";
          } else {
            showMsg(d.msg);
          }
        } catch (err) {
          showMsg("Lỗi kết nối");
        }
        btn.disabled = false;
        btn.textContent = "🔄 Gửi lại mã";
      }

      async function completeRegister() {
        const u = document.getElementById("user").value.trim();
        const e = document.getElementById("email").value.trim();
        const p = document.getElementById("pass").value;
        const otp = document.getElementById("otpInput").value.trim();
        const refCode = document.getElementById("ref-code").value.trim();
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = "Đang xử lý...";
        try {
          const r = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: u,
              email: e,
              password: p,
              otp_code: otp,
              referral_code: refCode,
            }),
          });
          const d = await r.json();
          if (d.ok) {
            showMsg("🎉 Đăng ký thành công! Đang chuyển hướng...", "ok");
            setTimeout(() => (window.location.href = "/login"), 1500);
          } else {
            showMsg(d.msg);
            btn.disabled = false;
            btn.textContent = "🚀 Hoàn tất đăng ký";
          }
        } catch (err) {
          showMsg("Lỗi kết nối");
          btn.disabled = false;
          btn.textContent = "🚀 Hoàn tất đăng ký";
        }
      }

      function backToStep1() {
        clearInterval(countdownTimer);
        setStep(1);
      }
      function backToStep2() {
        setStep(2);
        startCountdown(60);
      }

      // Allow pressing Enter in OTP field
      document.getElementById("otpInput")?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") verifyOtp();
      });
    </script>
  </body>
</html>
