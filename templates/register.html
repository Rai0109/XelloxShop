<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Xelloxx</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080c14;
        --card: #111827;
        --border: rgba(255, 150, 0, 0.15);
        --accent: #ff6a00;
        --accent2: #ff9500;
        --text: #e8eaf0;
        --muted: #8892a4;
        --green: #10b981;
        --red: #ef4444;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          rgba(255, 106, 0, 0.1),
          transparent 70%
        );
        pointer-events: none;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
        max-width: 400px;
        position: relative;
        z-index: 1;
        margin: 0 auto;
      }
      @media (max-width: 480px) {
        .card {
          padding: 1.5rem;
          border-radius: 16px;
          margin: 0.5rem;
        }
        .logo {
          font-size: 1.5rem;
          gap: 0.4rem;
        }
        .logo img {
          height: 28px;
        }
        .sub {
          font-size: 0.85rem;
          margin-bottom: 1.5rem;
        }
        .form-row {
          margin-bottom: 0.9rem;
        }
        .form-row input {
          padding: 0.7rem 0.9rem;
          font-size: 0.88rem;
        }
        .btn {
          padding: 0.75rem;
          font-size: 0.9rem;
        }
        .links {
          font-size: 0.8rem;
        }
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1.8rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 0.3rem;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .logo img {
        height: 32px;
        width: auto;
        max-height: 40px;
      }
      .sub {
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }
      .form-row {
        margin-bottom: 1rem;
      }
      .form-row label {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
        font-family: "Space Mono", monospace;
        letter-spacing: 0.5px;
      }
      .form-row input {
        width: 100%;
        padding: 0.8rem 1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: 0.2s;
      }
      .form-row input:focus {
        border-color: var(--accent);
        background: rgba(255, 106, 0, 0.04);
      }
      .btn {
        width: 100%;
        padding: 0.85rem;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border: none;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 0.5rem;
      }
      .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .msg {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        display: none;
      }
      .msg.err {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .msg.ok {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #34d399;
      }
      .links {
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .links a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="card">
      <div class="logo">
        <img
          src="/static/logo.png"
          alt="Xelloxx Logo"
          onerror="this.style.display = 'none'"
        />
        <span>Xelloxx</span>
      </div>
      <div class="sub">Tạo tài khoản mới - Chỉ cần username & password</div>
      <div class="msg" id="msg"></div>
      <div class="form-row">
        <label>Tên đăng nhập *</label>
        <input
          type="text"
          id="user"
          placeholder="username (tối thiểu 3 ký tự)"
          autocomplete="username"
        />
      </div>
      <div class="form-row">
        <label>Mật khẩu *</label>
        <input
          type="password"
          id="pass"
          placeholder="•••••••• (tối thiểu 6 ký tự)"
          autocomplete="new-password"
        />
      </div>
      <div class="form-row">
        <label>Xác nhận mật khẩu *</label>
        <input
          type="password"
          id="pass2"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>
      <div class="form-row">
        <label>Mã giới thiệu (tùy chọn)</label>
        <input type="text" id="ref-code" placeholder="Nhập mã nếu có..." />
      </div>
      <button class="btn" onclick="registerUser()">Đăng ký tài khoản</button>
      <div class="links">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
    </div>
    <script>
      const urlRef = new URLSearchParams(location.search).get("ref");
      if (urlRef) document.getElementById("ref-code").value = urlRef;

      function showMsg(text, type = "err") {
        const m = document.getElementById("msg");
        m.textContent = text;
        m.className = "msg " + type;
        m.style.display = "block";
        if (type === "ok") setTimeout(() => (m.style.display = "none"), 4000);
      }

      async function registerUser() {
        const u = document.getElementById("user").value.trim();
        const p = document.getElementById("pass").value;
        const p2 = document.getElementById("pass2").value;
        const refCode = document.getElementById("ref-code").value.trim();

        if (u.length < 3) {
          showMsg("Tên đăng nhập tối thiểu 3 ký tự");
          return;
        }
        if (p.length < 6) {
          showMsg("Mật khẩu tối thiểu 6 ký tự");
          return;
        }
        if (p !== p2) {
          showMsg("Mật khẩu không khớp");
          return;
        }

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = "Đang đăng ký...";

        try {
          const r = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: u,
              password: p,
              referral_code: refCode,
            }),
          });
          const d = await r.json();
          if (d.ok) {
            showMsg("🎉 Đăng ký thành công! Đang chuyển hướng...", "ok");
            setTimeout(() => (window.location.href = "/"), 1500);
          } else {
            showMsg(d.msg);
            btn.disabled = false;
            btn.textContent = "Đăng ký tài khoản";
          }
        } catch (err) {
          showMsg("Lỗi kết nối");
          btn.disabled = false;
          btn.textContent = "Đăng ký tài khoản";
        }
      }

      // Enter to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.id !== "ref-code") registerUser();
      });
    </script>
  </body>
</html>
